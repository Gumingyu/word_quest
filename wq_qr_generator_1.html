<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Noto Sans SC', system-ui, sans-serif;
  background:#1a0f08;
  min-height:100vh;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  padding:20px;
  color:#f5e6c8;
}
.card {
  background:#2d1b0f;
  border:3px solid #ffd166;
  border-radius:10px;
  padding:24px;
  max-width:440px;
  width:100%;
  box-shadow: 0 0 30px rgba(255,209,102,.3);
}
h1 {
  font-size:16px;
  color:#ffd166;
  margin-bottom:4px;
  letter-spacing:1px;
}
.sub {
  font-size:12px;
  color:#d4a045;
  margin-bottom:20px;
}
.field {
  margin-bottom:14px;
}
.field label {
  display:block;
  font-size:13px;
  font-weight:700;
  margin-bottom:5px;
  color:#f5e6c8;
}
.field label .hint {
  font-weight:400;
  color:#8a7060;
  font-size:11px;
  margin-left:5px;
}
input, select {
  width:100%;
  padding:10px 12px;
  background:#1a0f08;
  border:2px solid #5a3315;
  border-radius:5px;
  font-size:14px;
  color:#f5e6c8;
  font-family:inherit;
  outline:none;
}
input:focus, select:focus { border-color:#ffd166; }
input::placeholder { color:#5a4030; }

.btn {
  width:100%;
  background:#c1272d;
  border:none;
  color:#f5e6c8;
  font-size:16px;
  font-weight:700;
  padding:13px;
  border-radius:6px;
  cursor:pointer;
  margin-top:6px;
  letter-spacing:1px;
}
.btn:hover { background:#a01f23; }
.btn:active { transform:translateY(1px); }
.btn.gold { background:#ffd166; color:#1a0f08; margin-top:10px; }
.btn.gold:hover { background:#f0c050; }
.btn:disabled { background:#3d2818; color:#5a4030; cursor:not-allowed; }

.result {
  display:none;
  margin-top:20px;
  text-align:center;
}
.result.show { display:block; }

.qr-wrap {
  background:#fff;
  padding:14px;
  border-radius:8px;
  display:inline-block;
  border:3px solid #1a0f08;
  margin-bottom:10px;
  position:relative;
}
#qrDiv {
  width:220px;
  height:220px;
}
#qrDiv img, #qrDiv canvas {
  width:220px !important;
  height:220px !important;
  display:block;
}
.qr-label {
  margin-top:8px;
  font-size:13px;
  color:#d4a045;
}
.qr-label b { color:#ffd166; }

.url-box {
  background:#1a0f08;
  border:2px solid #5a3315;
  border-radius:5px;
  padding:10px;
  font-size:11px;
  font-family:'Courier New', monospace;
  color:#d4c4a0;
  word-break:break-all;
  text-align:left;
  max-height:80px;
  overflow-y:auto;
  margin-bottom:10px;
}

.status {
  font-size:12px;
  margin-bottom:10px;
  line-height:1.6;
  text-align:left;
  background:#1a0f08;
  border-radius:5px;
  padding:8px 10px;
}
.ok { color:#7dd87d; }
.warn { color:#f4c95d; }
.err { color:#ff6b6b; }

.divider {

<body>
<div class="card">
  <h1>🔗 学生专属二维码生成器</h1>
  <div class="sub">谷sir说英语 · Word Quest</div>

  <!-- 使用说明 -->
  <div class="step">
    <div class="step-num">1</div>
    <div class="step-text">填写<b>学生姓名</b>和<b>游戏网址</b></div>
  </div>
  <div class="step">
    <div class="step-num">2</div>
    <div class="step-text">点"生成二维码"，下载图片</div>
  </div>
  <div class="step">
    <div class="step-num">3</div>
    <div class="step-text">用微信发给家长，学生扫码玩专属题库</div>
  </div>

  <hr class="divider">

  <div class="field">
    <label>学生姓名 <span class="hint">（会显示在游戏顶部）</span></label>
    <input type="text" id="stuName" placeholder="如：周烨" maxlength="20">
  </div>

  <div class="field">
    <label>班级 <span class="hint">（可选）</span></label>
    <input type="text" id="stuClass" placeholder="如：初一·谷sir班" maxlength="30">
  </div>

  <div class="field">
    <label>游戏网址 <span class="hint">（GitHub Pages 地址）</span></label>
    <input type="text" id="gameUrl"
      placeholder="https://你的用户名.github.io/word-quest/word_quest_v6.html"
      value="">
  </div>

  <div class="field">
    <label>📚 题库来源</label>
    <div id="uploadArea" style="background:#2a1a0a; border:2px dashed #d4a045; border-radius:6px; padding:14px; text-align:center; cursor:pointer;" onclick="document.getElementById('jsonFileInput').click()">
      <input type="file" id="jsonFileInput" accept=".json" style="display:none" onchange="handleJsonUpload(event)">
      <div id="uploadPrompt" style="color:#d4a045; font-size:13px; line-height:1.8;">
        📂 点击上传本单元题库 JSON<br>
        <span style="color:#8a7060; font-size:11px;">（如：7B_Unit1_People_v2.json）</span>
      </div>
      <div id="uploadSuccess" style="display:none; color:#7dd87d; font-size:13px; line-height:1.8;">
        ✅ <span id="uploadedFileName"></span><br>
        <span id="uploadedQCount" style="color:#d4a045; font-size:11px;"></span>
      </div>
    </div>
    <div style="margin-top:8px; color:#5a4030; font-size:11px; text-align:center;">
      没有JSON？先把词表图片发给谷sir，我帮你出题。
    </div>
  </div>

  <div class="field" id="fallbackField" style="display:none;">
    <label style="color:#8a7060;">或者用内置备用题库</label>
    <select id="scope" style="background:#1a0a04; border-color:#5a3315; color:#8a7060;">
      <option value="1">第1关 · 15题（二维码最清晰）</option>
      <option value="2">前2关 · 30题</option>
      <option value="3">前3关 · 45题</option>
      <option value="5">全部 · 75题</option>
    </select>
    <div style="font-size:11px; color:#5a4030; margin-top:4px;">⚠️ 这是小升初通用题库，不是本单元词表</div>
  </div>
  <div style="text-align:right; margin-top:-8px; margin-bottom:8px;">
    <button onclick="toggleFallback()" style="background:none; border:none; color:#5a4030; font-size:11px; cursor:pointer; text-decoration:underline;">
      没有JSON，用备用题库 ▾
    </button>
  </div>

  <button class="btn" onclick="generate()">生成二维码 ▶</button>

  <!-- 结果区 -->
  <div class="result" id="result">
    <div class="status" id="status"></div>

    <div class="qr-wrap">
      <div id="qrDiv"></div>
    </div>
    <div class="qr-label" id="qrLabel"></div>

    <div class="url-box" id="urlBox"></div>

    <button class="btn gold" onclick="downloadQR()">💾 下载二维码图片</button>
    <button class="btn" style="background:#3d2818; margin-top:8px;" onclick="copyUrl()">📋 复制链接</button>
  </div>
</div>

let currentUrl = '';

function getPool(n) {
  const stages = {};
  for (let i = 1; i <= n; i++) {
    const k = 'stage' + i;
    if (FULL_POOL[k]) stages[k] = FULL_POOL[k];
  }
  return stages;
}

function generate() {
  const name = document.getElementById('stuName').value.trim();
  const cls  = document.getElementById('stuClass').value.trim();
  const url  = document.getElementById('gameUrl').value.trim();

  // 验证
  if (!name) { alert('请先填写学生姓名'); return; }
  if (!url)  { alert('请先填写游戏网址'); return; }
  if (!url.startsWith('http')) {
    alert('游戏网址格式不对，应该以 https:// 开头');
    return;
  }

  // 构造题库：优先用上传的，其次用内置
  let pool;
  if (window._customPool) {
    pool = window._customPool;
  } else {
    const n = parseInt(document.getElementById('scope').value);
    pool = getPool(n);
  }
  const totalQs = Object.values(pool).reduce((s, a) => s + a.length, 0);

  // 构造 payload
  const payload = {
    n: name,
    c: cls,
    p: pool,
    e: 0,
    t: Date.now(),
  };

  // LZ 压缩
  const jsonStr = JSON.stringify(payload);
  let encoded;
  try {
    encoded = '1' + LZString.compressToEncodedURIComponent(jsonStr);
  } catch(e) {
    encoded = '0' + btoa(unescape(encodeURIComponent(jsonStr)));
  }

  const finalUrl = url + '#wq=' + encoded;
  currentUrl = finalUrl;

  // 状态
  const len = finalUrl.length;
  let statusHtml, statusClass;
  if (len < 1500) {
    statusHtml = `✅ 完美！${totalQs}道题 · ${len}字符 · 二维码清晰`;
    statusClass = 'ok';
  } else if (len < 2300) {
    statusHtml = `⚠️ ${totalQs}道题 · ${len}字符 · 二维码偏密，近距离扫`;
    statusClass = 'warn';
  } else {
    statusHtml = `❌ ${len}字符超过二维码容量，请改选"第1关"或"前2关"`;
    statusClass = 'err';
    document.getElementById('status').className = 'status ' + statusClass;
    document.getElementById('status').innerHTML = statusHtml;
    document.getElementById('result').classList.add('show');
    document.getElementById('qrDiv').innerHTML = '';
    document.getElementById('urlBox').textContent = finalUrl;
    return;
  }

  document.getElementById('status').className = 'status ' + statusClass;
  document.getElementById('status').innerHTML = statusHtml;

  // 生成 QR
  document.getElementById('qrDiv').innerHTML = '';
  try {
    new QRCode(document.getElementById('qrDiv'), {
      text: finalUrl,
      width: 220,
      height: 220,
      colorDark: '#000000',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.L
    });
  } catch(e) {
    document.getElementById('qrDiv').innerHTML =
      '<div style="color:red;padding:20px;">QR生成失败: ' + e.message + '</div>';
  }

  // 标签和URL
  document.getElementById('qrLabel').innerHTML =
    `<b>${name}</b>${cls ? ' · ' + cls : ''} · ${totalQs}道题`;
  document.getElementById('urlBox').textContent = finalUrl;
  document.getElementById('result').classList.add('show');
}

function downloadQR() {
  if (!currentUrl) { alert('请先生成二维码'); return; }

  const container = document.getElementById('qrDiv');
  const qrCanvas = container.querySelector('canvas');
  const qrImg    = container.querySelector('img');
  let src = null;

  if (qrCanvas) {
    src = qrCanvas.toDataURL('image/png');
  } else if (qrImg && qrImg.src && qrImg.src.startsWith('data:')) {
    src = qrImg.src;
  }

  if (!src) {
    // 等一下再试（qrcodejs2有时候异步渲染）
    setTimeout(() => {
      const c2 = container.querySelector('canvas');
      const i2 = container.querySelector('img');
      if (c2) src = c2.toDataURL('image/png');
      else if (i2) src = i2.src;
      if (src) doDownload(src);
      else alert('二维码还未生成完成，请等一秒再点');
    }, 500);
    return;
  }
  doDownload(src);
}

function doDownload(src) {
  const name = document.getElementById('stuName').value.trim() || 'student';

  const finalCanvas = document.createElement('canvas');
  finalCanvas.width  = 300;
  finalCanvas.height = 340;
  const ctx = finalCanvas.getContext('2d');

  // 白底
  ctx.fillStyle = '#fffdf5';
  ctx.fillRect(0, 0, 300, 340);

  // 顶部文字
  ctx.fillStyle = '#1a0f08';
  ctx.font = 'bold 16px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('为 ' + name + ' 定制', 150, 28);

  ctx.font = '12px sans-serif';
  ctx.fillStyle = '#8a5a2a';
  ctx.fillText('扫码开始单词远征 · Word Quest', 150, 46);

  // 分隔线
  ctx.strokeStyle = '#d4a045';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(20, 54);
  ctx.lineTo(280, 54);
  ctx.stroke();

  // QR 图
  const img = new Image();
  img.onload = () => {
    ctx.drawImage(img, 40, 64, 220, 220);

    // 底部金色水印
    ctx.fillStyle = '#1a0f08';
    ctx.fillRect(0, 300, 300, 40);
    ctx.fillStyle = '#ffd166';
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('谷sir说英语 · WORD QUEST', 150, 326);

    const a = document.createElement('a');
    a.href = finalCanvas.toDataURL('image/png');
    a.download = 'WordQuest_' + name + '_' + new Date().toISOString().slice(0,10) + '.png';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  };
  img.onerror = () => {
    // 直接下载原始QR
    const a = document.createElement('a');
    a.href = src;
    a.download = 'QR_' + name + '.png';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  };
  img.src = src;
}

function copyUrl() {
  if (!currentUrl) { alert('请先生成二维码'); return; }
  navigator.clipboard.writeText(currentUrl).then(() => {
    alert('链接已复制，可以粘贴到微信发给家长');
  }).catch(() => {
    prompt('请手动复制以下链接：', currentUrl);
  });
}


// 上传 JSON 题库
let _uploadedPoolName = '';

function handleJsonUpload(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);

      // 校验格式
      const validKeys = ['stage1','stage2','stage3','stage4','stage5'];
      const foundKeys = Object.keys(data).filter(k => validKeys.includes(k));
      if (foundKeys.length === 0) {
        alert('文件格式不对，请上传谷sir生成的题库JSON文件');
        return;
      }
      let totalQs = 0;
      for (const k of foundKeys) {
        if (Array.isArray(data[k])) totalQs += data[k].length;
      }
      if (totalQs === 0) {
        alert('题库是空的，请检查文件');
        return;
      }

      // 存储并更新UI
      window._customPool = data;
      _uploadedPoolName = file.name;

      document.getElementById('uploadPrompt').style.display = 'none';
      document.getElementById('uploadSuccess').style.display = 'block';
      document.getElementById('uploadedFileName').textContent = file.name.replace('.json','');
      document.getElementById('uploadedQCount').textContent =
        `已加载 ${totalQs} 道题，共 ${foundKeys.length} 关`;

      // 隐藏备用题库
      document.getElementById('fallbackField').style.display = 'none';

    } catch(err) {
      alert('文件读取失败：' + err.message);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function toggleFallback() {
  const f = document.getElementById('fallbackField');
  f.style.display = f.style.display === 'none' ? 'block' : 'none';
}
